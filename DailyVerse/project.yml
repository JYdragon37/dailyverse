name: DailyVerse
options:
  bundleIdPrefix: dragonbear
  deploymentTarget:
    iOS: "16.6"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: dragonbear.DailyVerse
    DEVELOPMENT_TEAM: TJPBBG9WRN

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "5.0.0"
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"

targets:
  DailyVerse:
    type: application
    platform: iOS
    deploymentTarget: "16.6"
    sources:
      - path: DailyVerse
        excludes:
          - "**/*.md"
    resources:
      - path: DailyVerse/Assets.xcassets
      - path: DailyVerse/GoogleService-Info.plist
    info:
      path: DailyVerse/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
        NSLocationWhenInUseUsageDescription: "현재 날씨에 맞는 말씀을 전해드리기 위해 위치 정보가 필요합니다."
        NSWeatherKitUsageDescription: "현재 날씨에 맞는 말씀을 제공하기 위해 날씨 정보가 필요합니다."
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
    entitlements:
      path: DailyVerse/DailyVerse.entitlements
    dependencies:
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseCrashlytics
      - package: RevenueCat
        product: RevenueCat
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: DailyVerse/Info.plist
        CODE_SIGN_ENTITLEMENTS: DailyVerse/DailyVerse.entitlements
    scheme:
      testTargets:
        - DailyVerseTests
      gatherCoverageData: true

  DailyVerseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyVerseTests
    dependencies:
      - target: DailyVerse

  DailyVerseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DailyVerseUITests
    dependencies:
      - target: DailyVerse
